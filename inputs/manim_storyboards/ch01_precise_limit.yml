# Section 1.6 The Precise Definition of a Limit -- storyboard v1
# (authored against MANIM_STORYBOARD.md v1.3, generated as the v1.4 stress-test exemplar).
#
# Source: chapters/ch01_foundations.tex, Section 1.6 (lines 1332-1586).
# Scene plan: 14 scenes covering the section's three teaching arcs --
#   (1) the motivating "tolerance shrinks, neighborhood shrinks" pattern,
#   (2) the formal epsilon-delta definition with its geometric reading,
#   (3) two worked verifications, plus the uniqueness proof and the infinite-limit / continuity preview.
# No in-section subsections exist; concept transitions carry the role section_transition usually plays.
#
# Methodology stress-test notes (the reasons this storyboard departs from the Sec. 1.1 patterns):
# - Four "prose-only" scenes (#2, #4, #6 partly, #12) come from non-environment paragraphs that the
#   v1.3 Environment->Template Mapping table does not address. Treated as Incorporative / Bridge /
#   Forward-pointing per the v1.4 proposal.
# - Uniqueness proof is split into two scenes (statement + proof-with-aligned-chain) because
#   theorem_proof's schema cannot align the triangle-inequality chain on the relation symbol.
# - Only two graph_focus scenes (motivation + epsilon-delta picture) -- the section is symbol-heavy
#   and adding a graph to every algebraic example would dilute the core (see v1.4 #11).
# - The epsilon-delta picture (#6) uses a custom hook because the figure carries dense schematic
#   markup (epsilon band, delta band, hollow circle, double-arrow labels) that graph_focus.annotations
#   cannot render.
# - Repeat-pattern voiceover savings: scene #10 (quadratic example) does not re-establish the
#   "find delta such that |f(x) - L| < epsilon" setup that scene #9 (linear example) already built.
# - 9-sentence carve-out applies to scene #10 (procedure + min-trick + verification = three moves).

deck_id: "ch01_precise_limit"
language: "English"
theme:
  name: "midnight"
video:
  aspect_ratio: "16:9"
  pixel_width: 1920
  pixel_height: 1080
  frame_rate: 30
  preview_scale: 0.5

scenes:

  # ============================================================
  # 1. Opening hook. History expansion folded into voiceover.
  # ============================================================
  -
    scene_id: "opening_hook"
    template: "title_bullets"
    content_type: "definition"
    scene_exit: "hold"
    title: "The Precise Definition of a Limit"
    voiceover: >
      For two centuries after Newton and Leibniz, calculus did extraordinary work in physics
      and astronomy, but its foundations were under suspicion. Arguments leaned on infinitesimals,
      quantities thought of as extremely small without ever being defined precisely. The
      nineteenth century gave the answer we still use today: the epsilon-delta definition.
      Today we will replace the informal phrase "x is close to a" with a precise inequality,
      and we will see what that buys us.
    timing:
      lead_in_seconds: 0.3
      hold_after_seconds: 0.8
      minimum_duration_seconds: 6.0
    data:
      bullets:
        - "Informal limits used phrases like \\(x\\) is close to \\(a\\)."
        - "Today we replace that with a numerical inequality \\(0 < |x - a| < \\delta\\)."
        - "The payoff: limits become provable, not just plausible."

  # ============================================================
  # 2. Motivating piecewise function. graph_focus.
  # The setup prose at L1339-1347 is incorporative -- folded into this scene's voiceover lead-in.
  # ============================================================
  -
    scene_id: "piecewise_motivation"
    template: "graph_focus"
    content_type: "example"
    scene_exit: "hold"
    title: "When the Function's Value Disagrees With Its Limit"
    voiceover: >
      Consider a function that is two x minus one almost everywhere, but jumps to six at x equals
      three. As x approaches three, the linear part is heading toward five, not six. The value at
      three itself is irrelevant -- the limit looks at the neighborhood around the point, not the
      point. So we should expect the limit to be five. Our job today is to make that "should
      expect" into a proof.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.9
      minimum_duration_seconds: 6.0
    data:
      axes:
        x_range: [0, 5, 1]
        y_range: [0, 8, 1]
        x_length: 3.125
        y_length: 5.0
        include_numbers: false
        tips: true
        # equal_scale: true means lint enforces x_length/x_span == y_length/y_span
        # so the line's slope is geometrically faithful (slope 2 looks like slope 2).
        equal_scale: true
      plots:
        -
          kind: "function"
          expression: "2*x - 1"
          x_range: [0.5, 2.95]
          color: "#4cc9f0"
          label: "$f(x) = 2x - 1$"
          label_x: 1.5
          label_side: "right"
        -
          kind: "function"
          expression: "2*x - 1"
          x_range: [3.05, 4.5]
          color: "#4cc9f0"
        -
          kind: "point"
          point: [3, 5]
          color: "#c8c8d8"
          hollow: true
        -
          kind: "point"
          point: [3, 6]
          color: "#f9a825"
          hollow: false
      annotations:
        -
          text: "\\(f(3) = 6\\); the limit is \\(5\\)."

  # ============================================================
  # 3. Numerical tolerance example. example_walkthrough.
  # ============================================================
  -
    scene_id: "tolerance_example"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "How Close Is Close Enough?"
    voiceover_beats:
      -
        id: "set_output_tolerance"
        text: "Let us make close numerical. Suppose we demand that f of x differ from five by less than a tenth."
        reveal: ["header", "step_0"]
        hold_after_seconds: 0.15
      -
        id: "simplify_output_error"
        text: "The absolute value of f of x minus five simplifies to the absolute value of two x minus six."
        reveal: ["step_1", "math_line_0"]
        hold_after_seconds: 0.1
      -
        id: "factor_distance"
        text: "That is twice the absolute value of x minus three."
        reveal: ["math_line_1"]
        hold_after_seconds: 0.15
      -
        id: "solve_input_window"
        text: "So the tolerance one tenth on the output corresponds to a window of one twentieth on the input."
        reveal: ["step_2", "math_line_2"]
        hold_after_seconds: 0.2
      -
        id: "state_guarantee"
        text: "If x is within zero point zero five of three, then f of x is within a tenth of five."
        reveal: ["takeaway"]
        hold_after_seconds: 0.35
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.7
      minimum_duration_seconds: 7.0
    data:
      steps:
        - "Demand \\(|f(x) - 5| < 0.1\\)."
        - "Simplify: \\(|f(x) - 5| = 2\\,|x - 3|\\)."
        - "Solve: \\(|x - 3| < 0.05\\). \\(\\checkmark\\)"
      takeaway: "Output tolerance and input window are linked by the function's slope."
      math_layout: "equals_aligned"
      decay_previous: false
      math_lines:
        - "\\[|f(x) - 5| = |(2x - 1) - 5| = |2x - 6|\\]"
        -
          text:"\\[\\phantom{|f(x) - 5|} = 2\\,|x - 3|\\]"
          animation: "transform_from_previous"
        -
          text:"\\[|x - 3| < 0.05\\]"
          animation: "highlight"

  # ============================================================
  # 4. Bridge prose: tightening tolerance to arbitrary epsilon.
  # This is the decisive concept jump in the section: from specific numbers to a universal claim.
  # Treated as a "concept transition" using section_transition (v1.4 expanded use).
  # ============================================================
  -
    scene_id: "tolerance_to_general"
    template: "section_transition"
    scene_exit: "hold"
    title: "From Specific Tolerances to Every Tolerance"
    voiceover: >
      The same calculation works for tolerance one hundredth, or one thousandth. Whatever the
      tolerance is, we just halve it to get the input window. So in fact, for any positive epsilon
      whatsoever, we can take delta equal to epsilon over two and the guarantee holds. The word
      "arbitrarily" in the informal definition means exactly this: we can answer the question for
      every epsilon, not just for a chosen few.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 5.0
    data:
      subtitle: "From one tolerance to all of them"
      upcoming:
        - "The formal epsilon-delta definition"
        - "Its geometric picture"
        - "Two worked verifications"

  # ============================================================
  # 5. The formal definition. definition_math.
  # ============================================================
  -
    scene_id: "epsilon_delta_definition"
    template: "definition_math"
    content_type: "definition"
    scene_exit: "hold"
    title: "The $\\varepsilon$-$\\delta$ Definition"
    voiceover_beats:
      -
        id: "introduce_definition"
        text: "Here is the definition. The limit of f of x as x approaches a equals L."
        reveal: ["header", "statement", "math_line_0"]
        hold_after_seconds: 0.15
      -
        id: "epsilon_first"
        text: "For every positive epsilon, there exists a positive delta."
        reveal: ["math_line_1"]
        hold_after_seconds: 0.15
      -
        id: "implication"
        text: "Whenever x is within delta of a but not equal to a, the value f of x is within epsilon of L."
        reveal: ["math_line_2"]
        hold_after_seconds: 0.2
      -
        id: "quantifier_order"
        text: "Two quantifiers, in this order: for every epsilon, there exists a delta. The order matters."
        reveal: []
        hold_after_seconds: 0.1
      -
        id: "delta_depends"
        text: "Delta is allowed to depend on epsilon, but every epsilon must get its delta."
        reveal: []
        hold_after_seconds: 0.4
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.8
      minimum_duration_seconds: 7.0
    data:
      statement: "For every positive \\(\\varepsilon\\), there exists a positive \\(\\delta\\) such that \\(|f(x) - L| < \\varepsilon\\) whenever \\(0 < |x - a| < \\delta\\)."
      math_lines:
        - "\\[\\lim_{x \\to a} f(x) = L\\]"
        - "\\[\\forall\\,\\varepsilon > 0\\;\\;\\exists\\,\\delta > 0:\\]"
        -
          text:"\\[0 < |x - a| < \\delta \\;\\Longrightarrow\\; |f(x) - L| < \\varepsilon.\\]"
          animation: "highlight"

  # ============================================================
  # 6. Geometric picture. graph_focus + custom hook (figure has dense schematic markup
  # that exceeds graph_focus.annotations: epsilon-band horizontal dashed lines, delta-band
  # vertical dashed lines, hollow circle at (a, L), filled marker at (a, f(a)), four
  # boundary intersection dots, and arrowed labels for epsilon and delta).
  # The post-figure prose at L1451 is folded into this scene's voiceover.
  # ============================================================
  -
    scene_id: "epsilon_delta_picture"
    template: "graph_focus"
    hook: "tools.manim_hooks.ch01_precise_limit.epsilon_delta_picture"
    content_type: "definition"
    scene_exit: "hold"
    title: "What the Definition Looks Like"
    voiceover: "Here is the geometric reading. Pick a target tolerance epsilon: this draws a horizontal band around L of half-width epsilon. The definition demands a delta -- a vertical strip around a of half-width delta -- such that every graph point whose x-coordinate lies inside this strip, except possibly at x equals a itself, must land inside the horizontal band. The limit does not look at f of a. Now picture a smaller epsilon: the band squeezes, and we are forced to choose a smaller delta to keep the graph inside. The phrase \"for every epsilon\" means: no matter how thin the band gets, a matching delta exists."
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 1.0
      minimum_duration_seconds: 8.0
    data:
      axes:
        x_range: [0, 4, 1]
        y_range: [0, 14, 2]
        x_length: 7.0
        y_length: 4.6
        include_numbers: false
        tips: true
      plots:
        -
          kind: "function"
          expression: "exp(x*log(2))"
          x_range: [0.45, 2.95]
          color: "#4cc9f0"
        -
          kind: "function"
          expression: "exp(x*log(2))"
          x_range: [3.05, 3.45]
          color: "#4cc9f0"
        -
          kind: "point"
          point: [3, 8]
          color: "#c8c8d8"
          hollow: true
      annotations:
        -
          text: "\\(\\delta\\) shrinks as \\(\\varepsilon\\) shrinks."

  # ============================================================
  # 7a. Uniqueness theorem statement. definition_math (theorem accent).
  # ============================================================
  -
    scene_id: "uniqueness_statement"
    template: "definition_math"
    content_type: "theorem"
    scene_exit: "hold"
    title: "First Payoff: The Limit Is Unique"
    voiceover_beats:
      -
        id: "payoff"
        text: "Here is the first thing the definition buys us. If a limit exists, it is unambiguous."
        reveal: ["header", "statement"]
        hold_after_seconds: 0.15
      -
        id: "two_limits"
        text: "There is no second value the function could also be approaching."
        reveal: ["math_line_0"]
        hold_after_seconds: 0.15
      -
        id: "conclusion"
        text: "With the precise definition, this is a theorem we can prove."
        reveal: ["math_line_1"]
        hold_after_seconds: 0.35
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.7
      minimum_duration_seconds: 5.5
    data:
      statement: "If a limit exists, it is unique."
      math_lines:
        - "\\[\\lim_{x \\to a} f(x) = L \\;\\;\\text{and}\\;\\; \\lim_{x \\to a} f(x) = M\\]"
        -
          text:"\\[\\Longrightarrow \\; L = M.\\]"
          animation: "highlight"

  # ============================================================
  # 7b. Uniqueness proof. example_walkthrough used as proof container with equals_aligned
  # because theorem_proof's schema cannot render the triangle-inequality alignment chain.
  # The "verification" interpretation: derive a contradiction by chasing |L-M| through the
  # triangle inequality and re-establishing the original |L-M|.
  # ============================================================
  -
    scene_id: "uniqueness_proof"
    template: "example_walkthrough"
    content_type: "theorem"
    scene_exit: "hold"
    title: "Proof: Two Limits Force a Contradiction"
    voiceover_beats:
      -
        id: "assume_two_limits"
        text: "Suppose for contradiction that the same function had two limits, L and M, with L different from M."
        reveal: ["header", "step_0"]
        hold_after_seconds: 0.1
      -
        id: "choose_epsilon"
        text: "Set epsilon to half the distance between them."
        reveal: []
        hold_after_seconds: 0.1
      -
        id: "get_two_deltas"
        text: "The definition gives a delta one for L and a delta two for M."
        reveal: ["step_1"]
        hold_after_seconds: 0.1
      -
        id: "smaller_delta"
        text: "Take x within the smaller of the two deltas, so f of x is within epsilon of both L and M."
        reveal: ["step_2"]
        hold_after_seconds: 0.1
      -
        id: "insert_fx"
        text: "Now bound the absolute value of L minus M by inserting f of x."
        reveal: ["step_3", "math_line_0"]
        hold_after_seconds: 0.1
      -
        id: "triangle_inequality"
        text: "The triangle inequality splits it into the distance from L to f of x plus the distance from f of x to M."
        reveal: ["math_line_1"]
        hold_after_seconds: 0.1
      -
        id: "contradiction_chain"
        text: "Each term is less than epsilon, so the total is less than two epsilon, which equals the original distance."
        reveal: ["step_4", "math_line_2"]
        hold_after_seconds: 0.2
      -
        id: "therefore"
        text: "We have shown the distance is strictly less than itself, a contradiction. Therefore L equals M."
        reveal: ["takeaway"]
        hold_after_seconds: 0.45
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.9
      minimum_duration_seconds: 9.5
    data:
      steps:
        - "Assume \\(L \\neq M\\); set \\(\\varepsilon = \\tfrac{|L - M|}{2}\\)."
        - "Get \\(\\delta_1, \\delta_2\\) from the two limits."
        - "Take \\(x\\) within \\(\\min\\{\\delta_1, \\delta_2\\}\\); both inequalities hold."
        - "Insert \\(f(x)\\) and use the triangle inequality."
        - "The chain closes back on \\(|L - M|\\): contradiction. \\(\\checkmark\\)"
      takeaway: "Triangle inequality + epsilon-delta = uniqueness, for free."
      math_layout: "equals_aligned"
      decay_previous: false
      math_lines:
        - "\\[|L - M| = |L - f(x) + f(x) - M|\\]"
        -
          text:"\\[\\phantom{|L - M|} \\le |L - f(x)| + |f(x) - M|\\]"
          animation: "transform_from_previous"
        -
          text:"\\[\\phantom{|L - M|} < 2\\varepsilon = |L - M|\\]"
          animation: "highlight"

  # ============================================================
  # 8. Verification procedure. procedure_steps.
  # Strategy box (judgment-type, not algorithm); worked_equations holds the schematic shape
  # that the procedure aims to produce, not the algorithm's literal output.
  # ============================================================
  -
    scene_id: "verification_procedure"
    template: "procedure_steps"
    content_type: "procedure"
    scene_exit: "hold"
    title: "How to Verify $\\lim f(x) = L$ from the Definition"
    voiceover_beats:
      -
        id: "routine"
        text: "Verifying a limit from the definition is a four-step routine."
        reveal: ["header"]
        hold_after_seconds: 0.1
      -
        id: "generic_epsilon"
        text: "Start with a generic positive epsilon, not a specific number, and treat it as the input."
        reveal: ["step_0"]
        hold_after_seconds: 0.1
      -
        id: "bound_error"
        text: "Work with the absolute value of f of x minus L, and bound it by an expression involving the absolute value of x minus a."
        reveal: ["step_1"]
        hold_after_seconds: 0.1
      -
        id: "choose_delta"
        text: "Choose delta so that the bound is less than epsilon."
        reveal: ["step_2"]
        hold_after_seconds: 0.1
      -
        id: "min_trick"
        text: "If another factor depends on x, pre-restrict x near a, then take delta to be the minimum of the radius and the epsilon-based bound."
        reveal: ["step_3"]
        hold_after_seconds: 0.1
      -
        id: "write_implication"
        text: "The final write-up must read forward: given epsilon, choose delta, then verify the implication."
        reveal: ["equation_0"]
        hold_after_seconds: 0.35
    timing:
      lead_in_seconds: 0.3
      hold_after_seconds: 0.7
      minimum_duration_seconds: 7.5
    data:
      steps:
        - "Take a generic \\(\\varepsilon > 0\\); seek \\(\\delta > 0\\)."
        - "Bound \\(|f(x) - L|\\) above by an expression in \\(|x - a|\\)."
        - "Choose \\(\\delta\\) so the bound is below \\(\\varepsilon\\)."
        - "If an auxiliary factor depends on \\(x\\), use \\(\\delta = \\min\\{\\text{radius}, \\text{bound}\\}\\)."
      math_layout: "left"
      worked_equations:
        - "\\[0 < |x - a| < \\delta \\;\\Longrightarrow\\; |f(x) - L| < \\varepsilon\\]"

  # ============================================================
  # 9. Linear example: lim_{x->3}(4x-5)=7. example_walkthrough.
  # Establishes the procedure on the simpler case before the min-trick example.
  # ============================================================
  -
    scene_id: "linear_epsilon_delta"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "Worked Example: $\\lim_{x \\to 3}(4x - 5) = 7$"
    voiceover_beats:
      -
        id: "state_goal"
        text: "Given a positive epsilon, we want four x minus five to be within epsilon of seven whenever x is close enough to three."
        reveal: ["header", "step_0"]
        hold_after_seconds: 0.1
      -
        id: "compute_error"
        text: "Compute the absolute value of four x minus five minus seven."
        reveal: ["math_line_0"]
        hold_after_seconds: 0.1
      -
        id: "constant_multiple"
        text: "It simplifies to four times the absolute value of x minus three."
        reveal: ["step_1", "math_line_1"]
        hold_after_seconds: 0.1
      -
        id: "choose_delta"
        text: "To force this below epsilon, require x minus three to be less than epsilon over four."
        reveal: ["step_2", "math_line_2"]
        hold_after_seconds: 0.15
      -
        id: "linear_takeaway"
        text: "So delta equals epsilon over four, and the implication holds for every epsilon."
        reveal: ["takeaway"]
        hold_after_seconds: 0.4
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.8
      minimum_duration_seconds: 7.0
    data:
      steps:
        - "Want \\(|(4x - 5) - 7| < \\varepsilon\\)."
        - "Simplify: \\(|(4x - 5) - 7| = 4\\,|x - 3|\\)."
        - "Choose \\(\\delta = \\tfrac{\\varepsilon}{4}\\). \\(\\checkmark\\)"
      takeaway: "When \\(|f(x) - L|\\) is a constant multiple of \\(|x - a|\\), \\(\\delta = \\varepsilon / \\text{constant}\\)."
      math_layout: "equals_aligned"
      decay_previous: false
      math_lines:
        - "\\[|(4x - 5) - 7| = |4x - 12|\\]"
        -
          text:"\\[\\phantom{|(4x - 5) - 7|} = 4\\,|x - 3|\\]"
          animation: "transform_from_previous"
        -
          text:"\\[\\delta = \\tfrac{\\varepsilon}{4}\\]"
          animation: "highlight"

  # ============================================================
  # 10. Quadratic example with min-trick. example_walkthrough, 9-sentence carve-out applies
  # (procedure + auxiliary-factor control + min-trick + verification = three distinct moves
  # bundled with verification).
  # Voiceover deliberately does NOT re-establish "find delta such that..." setup -- the
  # linear example built that, and the new content is the min-trick.
  # ============================================================
  -
    scene_id: "quadratic_epsilon_delta"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "Worked Example: $\\lim_{x \\to 1}(x^{2} - 5x + 6) = 2$"
    voiceover_beats:
      -
        id: "delicate_algebra"
        text: "Same goal as before, but the algebra is more delicate."
        reveal: ["header"]
        hold_after_seconds: 0.1
      -
        id: "factor_expression"
        text: "The expression simplifies to the product of x minus one and x minus four, so we have two factors to handle."
        reveal: ["step_0", "math_line_0"]
        hold_after_seconds: 0.1
      -
        id: "controlled_factor"
        text: "The first factor is the small quantity we control; the second factor depends on x."
        reveal: []
        hold_after_seconds: 0.1
      -
        id: "pre_restrict"
        text: "Pre-restrict by demanding x is within one of one. Then x lies between zero and two, so the absolute value of x minus four is at most four."
        reveal: ["step_1"]
        hold_after_seconds: 0.1
      -
        id: "bound_product"
        text: "Now the product is at most four times the absolute value of x minus one."
        reveal: ["math_line_1"]
        hold_after_seconds: 0.1
      -
        id: "epsilon_bound"
        text: "To push this below epsilon, force the absolute value of x minus one below epsilon over four."
        reveal: ["step_2"]
        hold_after_seconds: 0.1
      -
        id: "minimum_delta"
        text: "The new feature is the min trick: delta must satisfy both the pre-restriction and the epsilon-based bound."
        reveal: ["step_3", "math_line_2"]
        hold_after_seconds: 0.15
      -
        id: "quadratic_takeaway"
        text: "So we take delta to be the minimum of one and epsilon over four."
        reveal: ["takeaway"]
        hold_after_seconds: 0.45
    timing:
      lead_in_seconds: 0.3
      hold_after_seconds: 0.9
      minimum_duration_seconds: 11.0
    data:
      steps:
        - "Simplify: \\(|f(x) - 2| = |x - 1|\\,|x - 4|\\)."
        - "Pre-restrict \\(|x - 1| < 1\\); then \\(|x - 4| < 4\\)."
        - "Force \\(4\\,|x - 1| < \\varepsilon\\), i.e.\\ \\(|x - 1| < \\tfrac{\\varepsilon}{4}\\)."
        - "Take \\(\\delta = \\min\\{1, \\tfrac{\\varepsilon}{4}\\}\\). \\(\\checkmark\\)"
      takeaway: "When the bound carries an \\(x\\)-dependent factor, pre-restrict, then take the minimum."
      math_layout: "equals_aligned"
      decay_previous: false
      math_lines:
        - "\\[|f(x) - 2| = |(x - 1)(x - 4)|\\]"
        -
          text:"\\[\\phantom{|f(x) - 2|} < 4\\,|x - 1|\\quad (\\text{when } |x - 1| < 1)\\]"
          animation: "transform_from_previous"
        -
          text:"\\[\\delta = \\min\\!\\left\\{1, \\tfrac{\\varepsilon}{4}\\right\\}\\]"
          animation: "highlight"

  # ============================================================
  # 11. Infinite limit, precise version. definition_math.
  # The two halves (+infty and -infty) are kept in one scene -- the second is a sign-flipped
  # restatement of the first, so per the v1.3 "two formal statements close together" rule
  # they fold into one definition_math scene with paired math_lines.
  # ============================================================
  -
    scene_id: "infinite_limit_precise"
    template: "definition_math"
    content_type: "definition"
    scene_exit: "hold"
    title: "Infinite Limits, Made Precise"
    voiceover_beats:
      -
        id: "same_machinery"
        text: "The same machinery upgrades the informal infinite-limit definition."
        reveal: ["header", "statement"]
        hold_after_seconds: 0.1
      -
        id: "positive_infinity_quantifiers"
        text: "The limit is plus infinity if, for every positive threshold M, there exists a delta."
        reveal: ["math_line_0"]
        hold_after_seconds: 0.1
      -
        id: "positive_infinity_implication"
        text: "Whenever x is within delta of a but not equal to a, f of x exceeds M."
        reveal: ["math_line_1"]
        hold_after_seconds: 0.1
      -
        id: "negative_infinity"
        text: "The minus-infinity version is the mirror: for any negative threshold N, f of x is less than N."
        reveal: ["math_line_2"]
        hold_after_seconds: 0.15
      -
        id: "threshold_intuition"
        text: "The threshold can be pushed arbitrarily far, and close enough to a, the function eventually clears it in the appropriate direction."
        reveal: []
        hold_after_seconds: 0.4
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.8
      minimum_duration_seconds: 7.5
    data:
      statement: "Replace \\(|f(x) - L| < \\varepsilon\\) with an unbounded threshold: \\(f(x) > M\\) (or \\(f(x) < N\\))."
      math_lines:
        - "\\[\\lim_{x \\to a} f(x) = \\infty:\\;\\;\\forall M > 0\\;\\;\\exists\\,\\delta > 0\\]"
        - "\\[0 < |x - a| < \\delta \\;\\Longrightarrow\\; f(x) > M.\\]"
        -
          text:"\\[\\lim_{x \\to a} f(x) = -\\infty:\\;\\;f(x) < N \\text{ instead.}\\]"
          animation: "highlight"

  # ============================================================
  # 12. Continuity preview (forward-pointing). definition_math.
  # The expansion:formula at L1581-1586 is a forward reference to a later chapter; treated as a
  # standalone scene because it carries an equation worth animating, with voiceover register
  # "before we close, here is a glimpse" matching the forward-pointing classification.
  # ============================================================
  -
    scene_id: "continuity_preview"
    template: "definition_math"
    content_type: "definition"
    scene_exit: "hold"
    title: "A Glimpse Ahead: Continuity"
    voiceover_beats:
      -
        id: "one_line_preview"
        text: "Before we close, a one-line preview."
        reveal: ["header", "statement"]
        hold_after_seconds: 0.1
      -
        id: "continuity_equation"
        text: "If the function is defined at a, and the limit at a equals the value at a, then the function is called continuous at a."
        reveal: ["math_line_0"]
        hold_after_seconds: 0.15
      -
        id: "why_it_matters"
        text: "Continuity is a property of well-behaved functions that we will study later, and many theorems about derivatives and integrals rest on it."
        reveal: []
        hold_after_seconds: 0.4
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.8
      minimum_duration_seconds: 6.0
    data:
      statement: "\\(f\\) is continuous at \\(a\\) when its limit there matches its value there."
      math_lines:
        -
          text:"\\[\\lim_{x \\to a} f(x) = f(a).\\]"
          animation: "highlight"

  # ============================================================
  # 13. Recap.
  # ============================================================
  -
    scene_id: "recap"
    template: "recap_cards"
    content_type: "recap"
    scene_exit: "hold"
    title: "Key Takeaways"
    voiceover_beats:
      -
        id: "recap_intro"
        text: "Five things to take away."
        reveal: ["header"]
        hold_after_seconds: 0.1
      -
        id: "recap_definition"
        text: "First, the precise definition replaces close with two inequalities, and the order of quantifiers matters."
        reveal: ["point_0", "identity_0"]
        hold_after_seconds: 0.1
      -
        id: "recap_geometry"
        text: "Second, the geometric reading is a horizontal epsilon band and a vertical delta strip."
        reveal: ["point_1"]
        hold_after_seconds: 0.1
      -
        id: "recap_unique"
        text: "Third, limits are unique by a clean triangle-inequality argument."
        reveal: ["point_2"]
        hold_after_seconds: 0.1
      -
        id: "recap_verification"
        text: "Fourth, verification means bounding the error, and using the minimum when an x-dependent factor appears."
        reveal: ["point_3"]
        hold_after_seconds: 0.1
      -
        id: "recap_next"
        text: "Fifth, infinite limits and continuity both speak the same language now."
        reveal: ["point_4", "identity_1"]
        hold_after_seconds: 0.45
    timing:
      lead_in_seconds: 0.3
      hold_after_seconds: 1.0
      minimum_duration_seconds: 9.0
    data:
      points:
        - "\\(\\varepsilon\\)-\\(\\delta\\): for every \\(\\varepsilon > 0\\), some \\(\\delta > 0\\) works."
        - "Geometric reading: band of half-width \\(\\varepsilon\\), strip of half-width \\(\\delta\\)."
        - "Limits are unique (triangle inequality)."
        - "Verification: bound \\(|f(x) - L|\\) by \\(|x - a|\\); use \\(\\delta = \\min\\{\\cdot, \\cdot\\}\\) when needed."
        - "Infinite limits and continuity reuse the same machinery."
      identities:
        - "\\[0 < |x - a| < \\delta \\;\\Longrightarrow\\; |f(x) - L| < \\varepsilon\\]"
        -
          text:"\\[\\lim_{x \\to a} f(x) = f(a)\\;\\;\\text{(continuity at }a\\text{).}\\]"
          animation: "highlight"

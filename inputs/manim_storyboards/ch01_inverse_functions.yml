# Section 1.1 Inverse Functions -- storyboard v2 (authored against MANIM_STORYBOARD.md v1.1).
#
# Source: chapters/ch01_foundations.tex, Section 1.1 (lines 7-315).
# Scene plan: 19 scenes covering subsec 1.1.1 (one-to-one), 1.1.2 (inverse), 1.1.3 (finding the inverse),
# with two section_transitions between the three subsections, added graph_focus visualizations
# for every prose geometric claim, and opening/recap bookends.
#
# Deliberate skips (documented per MANIM_STORYBOARD.md "When to skip a book figure entirely"):
# - Book fig:inverse-composition (TikZ mapping diagram, chapters/ch01_foundations.tex line 210) is NOT
#   redrawn as its own scene. Its content -- that f and f^{-1} travel x<->y in opposite directions --
#   is carried by the voiceover of `composition_identities` and the geometry of `cubic_graph_reflection`.
#   Redrawing the mapping diagram would need a new custom hook with arrows and bent connectors; the
#   pedagogical payoff is low because the cancellation identities already carry the same idea.
# - Book's 2-sentence convention note at line 144 ("when focus shifts to f^{-1}, we use x as independent
#   variable") is folded into the `inverse_definition` voiceover rather than becoming a scene.
# - Book's intro Celsius/Fahrenheit motivation is folded into the `opening_hook` voiceover rather than
#   becoming a scene -- it is motivation, not a distinct teaching idea.

deck_id: "ch01_inverse_functions"
language: "English"
theme:
  name: "midnight"
video:
  aspect_ratio: "16:9"
  pixel_width: 1920
  pixel_height: 1080
  frame_rate: 30
  preview_scale: 0.5

scenes:

  # ============================================================
  # Opening hook. Motivation: can every function be run backwards?
  # ============================================================
  -
    scene_id: "opening_hook"
    template: "title_bullets"
    content_type: "definition"
    scene_exit: "hold"
    title: "Inverse Functions"
    voiceover: >
      A function is a one-way process: you put in a number, you get one back.
      But a lot of the time, we also want to run the process in reverse.
      A formula turns Celsius into Fahrenheit; we want the formula that turns Fahrenheit back.
      A formula turns a radius into a volume; we want the formula that recovers the radius from the volume.
      So here is the question we will answer today: when can we actually reverse a function,
      and when is it impossible?
    timing:
      lead_in_seconds: 0.3
      hold_after_seconds: 0.8
      minimum_duration_seconds: 6.0
    data:
      bullets:
        - "A function sends an input \\(x\\) to an output \\(y = f(x)\\)."
        - "Can we always reverse the process and recover \\(x\\) from \\(y\\)?"
        - "When we can, the reverse rule is written \\(f^{-1}\\)."

  # ============================================================
  # Subsection 1.1.1: one-to-one functions
  # ============================================================
  -
    scene_id: "one_to_one_definition"
    template: "definition_math"
    content_type: "definition"
    scene_exit: "hold"
    title: "One-to-One Functions"
    voiceover: >
      The property we need is called one-to-one. A function is one-to-one when different inputs
      always give different outputs. No two distinct x-values ever land on the same y-value.
      There is an equivalent way to state this that is often easier in a proof: if f of x one
      equals f of x two, then x one must equal x two. The two forms say exactly the same thing;
      the second is the contrapositive of the first.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 5.5
    data:
      statement: "A function \\(f\\) is one-to-one if different inputs always produce different outputs."
      math_lines:
        - "\\[f(x_1) \\ne f(x_2) \\qquad \\text{whenever } x_1 \\ne x_2.\\]"
        -
          text: "\\[f(x_1) = f(x_2) \\;\\Longrightarrow\\; x_1 = x_2.\\]"
          animation: "highlight"

  -
    scene_id: "real_world_one_to_one"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "A Real-World Check"
    voiceover: >
      Before we try any algebra, here is a test you can do in a room full of people.
      Assign each student their student ID number. No two students share an ID, so different
      students always come out with different IDs. That function is one-to-one.
      Now assign each student their blood type. Alice is Type O, Bob is Type O -- two different
      students, same output. That function is not one-to-one. The move is always the same:
      ask whether a single output could have come from two different inputs.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 6.0
    data:
      steps:
        - "Student \\(\\to\\) Student ID: every student has a unique number."
        - "Student \\(\\to\\) Blood type: Alice and Bob can both be Type O."
        - "One-to-one means each output points back to exactly one input."
      takeaway: "If any output could have come from two different inputs, the function is not one-to-one."
      math_lines:
        - "\\[f(\\text{student}) = \\text{Student ID} \\qquad \\checkmark\\]"
        - "\\[g(\\text{student}) = \\text{Blood type} \\qquad \\times\\]"

  -
    scene_id: "algebraic_one_to_one_test"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "Testing with Algebra"
    voiceover: >
      Now two mathematical functions. First, f of x equals x on the interval zero to one.
      If x one is different from x two, then f of x one, which is just x one, is obviously
      different from f of x two, which is just x two. So this one is one-to-one.
      Second, g of x equals x squared on minus one to one. Watch what happens at one half
      and minus one half -- two different inputs, but they both square to one fourth.
      One counterexample is enough: g is not one-to-one on this interval.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 6.5
    data:
      steps:
        - "\\(f(x) = x\\) on \\([0,1]\\): distinct inputs give distinct outputs."
        - "\\(g(x) = x^2\\) on \\([-1,1]\\): check \\(x = \\tfrac{1}{2}\\) against \\(x = -\\tfrac{1}{2}\\)."
        - "Both give \\(g = \\tfrac{1}{4}\\), so \\(g\\) is not one-to-one."
      takeaway: "To prove a function is not one-to-one, you only need a single pair of inputs that collide."
      math_lines:
        - "\\[f(x) = x, \\qquad 0 \\le x \\le 1.\\]"
        -
          text: "\\[g\\!\\left(\\tfrac{1}{2}\\right) = \\tfrac{1}{4} = g\\!\\left(-\\tfrac{1}{2}\\right).\\]"
          animation: "highlight"

  -
    scene_id: "why_x_squared_fails"
    template: "graph_focus"
    content_type: "warning"
    scene_exit: "hold"
    title: "Why $x^2$ Cannot Be Inverted on $[-1, 1]$"
    # This scene is not in the book -- added per MANIM_STORYBOARD.md rule: prose geometric claims
    # ("two inputs share the output 1/4") deserve their own graph_focus visualization.
    voiceover: >
      Let us see that failure on a graph. Here is the parabola y equals x squared on the interval
      minus one to one. The output one fourth sits at this horizontal level. A dashed line at that
      level crosses the curve in two places -- at x equals one half on the right and x equals minus
      one half on the left. If we tried to define g inverse of one fourth, we would have to pick
      between two equally good answers. A function cannot return two answers at once. So g inverse
      of one fourth is simply not defined.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.9
      minimum_duration_seconds: 6.0
    data:
      axes:
        x_range: [-1.5, 1.5, 0.5]
        y_range: [-0.3, 1.5, 0.5]
        x_length: 8.0
        y_length: 5.0
        include_numbers: true
        tips: true
      plots:
        -
          kind: "function"
          expression: "x**2"
          x_range: [-1.2, 1.2]
          color: "#4cc9f0"
          label: "$g(x) = x^2$"
        -
          kind: "line"
          start: [-1.4, 0.25]
          end: [1.4, 0.25]
          color: "#ff6b6b"
          dashed: true
          label: "$y = 1/4$"
        -
          kind: "point"
          point: [0.5, 0.25]
          color: "#f9a825"
          hollow: false
        -
          kind: "point"
          point: [-0.5, 0.25]
          color: "#f9a825"
          hollow: false
      annotations:
        -
          text: "Two inputs share the same output."
        -
          text: "\\(g^{-1}\\!\\left(\\tfrac{1}{4}\\right)\\) is not well defined."

  -
    scene_id: "horizontal_line_test_statement"
    template: "definition_math"
    content_type: "proposition"
    # Book environment is \begin{remark}, but the horizontal line test is a named rule with an
    # if-and-only-if characterization -- per MANIM_STORYBOARD.md, such remarks are promoted
    # to proposition-level scenes.
    scene_exit: "hold"
    title: "The Horizontal Line Test"
    voiceover: >
      There is a clean visual rule that captures all of this. A horizontal line has equation y
      equals c, so it represents one fixed output value. If that line crosses the graph more
      than once, two different x-values are producing the same output and the function is not
      one-to-one. If every horizontal line you can draw hits the graph at most once, then every
      output corresponds to a unique input, and the function is one-to-one. That is the horizontal
      line test.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 5.5
    data:
      statement: "A function is one-to-one if and only if every horizontal line meets its graph at most once."
      math_lines:
        -
          text: "\\[y = c \\text{ hits the graph twice} \\;\\Longrightarrow\\; f(x_1) = c = f(x_2).\\]"
          animation: "highlight"
      supporting_bullets:
        - "At most one intersection per horizontal line: one-to-one."
        - "Two or more intersections somewhere: not one-to-one."

  -
    scene_id: "horizontal_line_test_figure"
    template: "graph_focus"
    hook: "tools.manim_hooks.ch01_inverse_functions.horizontal_line_test_comparison"
    # Custom hook: the book figure is a two-panel comparison that no single template layout
    # captures. The hook is already implemented at tools/manim_hooks/ch01_inverse_functions.py.
    scene_exit: "hold"
    title: "The Test in Action"
    voiceover: >
      On the left, a straight line. Every horizontal level crosses it exactly once, so this
      graph passes the test. On the right, a parabola. A horizontal line at the right height
      crosses it twice, once on each side of the axis of symmetry, so this graph fails the test.
      When you are looking at a graph and wondering whether an inverse can exist, the sweeping
      horizontal line is the fastest check you have.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.9
      minimum_duration_seconds: 5.5
    data:
      axes:
        x_range: [-3, 3, 1]
        y_range: [-1, 4, 1]
        x_length: 6.2
        y_length: 4.2
        include_numbers: false
        tips: true
      plots:
        -
          kind: "line"
          start: [-1.5, -1.5]
          end: [1.3, 1.3]
          color: "#4cc9f0"
        -
          kind: "line"
          start: [-2.1, 1.0]
          end: [1.3, 1.0]
          color: "#ff6b6b"
          dashed: true
        -
          kind: "function"
          expression: "1.15 * x**2"
          x_range: [-1.35, 1.35]
          color: "#4cc9f0"
        -
          kind: "line"
          start: [-1.85, 1.25]
          end: [1.85, 1.25]
          color: "#ff6b6b"
          dashed: true
        -
          kind: "point"
          point: [-1.04, 1.25]
          color: "#f9a825"
        -
          kind: "point"
          point: [1.04, 1.25]
          color: "#f9a825"
      annotations:
        -
          text: "Passes: one intersection."
        -
          text: "Fails: two intersections."

  # ============================================================
  # Transition from 1.1.1 (one-to-one) to 1.1.2 (inverse functions)
  # ============================================================
  -
    scene_id: "transition_to_inverses"
    template: "section_transition"
    scene_exit: "hold"
    title: "Defining the Inverse"
    voiceover: >
      Now that we know what one-to-one means, we can define the inverse function itself.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.4
      minimum_duration_seconds: 3.0
    data:
      subtitle: "From one-to-one to invertible"
      upcoming:
        - "The formal definition of an inverse"
        - "The existence theorem"
        - "The cancellation equations"

  # ============================================================
  # Subsection 1.1.2: inverse functions
  # ============================================================
  -
    scene_id: "inverse_definition"
    template: "definition_math"
    content_type: "definition"
    scene_exit: "hold"
    title: "The Inverse Function"
    voiceover: >
      Here is the definition. Suppose f is one-to-one with domain A and range B. Its inverse,
      written f inverse, has domain B and range A, and the rule is: f inverse of y equals x
      exactly when f of x equals y. So the inverse just reverses the direction. The outputs of
      f become the inputs of f inverse, and the inputs of f become the outputs. By convention,
      when we focus on the inverse itself, we switch back to writing its independent variable as x.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 6.0
    data:
      statement: "If \\(f\\) is one-to-one with domain \\(A\\) and range \\(B\\), its inverse \\(f^{-1}\\) reverses the correspondence."
      math_lines:
        -
          text: "\\[f^{-1}(y) = x \\quad\\Longleftrightarrow\\quad f(x) = y, \\qquad y \\in B.\\]"
          animation: "write"
      supporting_bullets:
        - "Domain of \\(f^{-1}\\) = range of \\(f\\)."
        - "Range of \\(f^{-1}\\) = domain of \\(f\\)."

  -
    scene_id: "existence_theorem"
    template: "theorem_proof"
    content_type: "theorem"
    scene_exit: "hold"
    title: "When Does an Inverse Exist?"
    voiceover: >
      The central theorem is tight: a function has an inverse if and only if it is one-to-one.
      Forward direction first. Suppose f has an inverse. If f of x one equals f of x two, apply
      f inverse to both sides; the compositions collapse and we are left with x one equals x two.
      So f is one-to-one. Conversely, suppose f is one-to-one. For each y in the range, there
      is exactly one x that maps to it -- the one-to-one property guarantees uniqueness. That
      rule, y back to its unique x, is the inverse function.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 7.5
    data:
      theorem_statement: "A function has an inverse function if and only if it is one-to-one."
      proof_steps:
        - "Assume \\(f\\) has an inverse and \\(f(x_1) = f(x_2)\\). Apply \\(f^{-1}\\) to both sides:"
        - "\\(f^{-1}(f(x_1)) = f^{-1}(f(x_2)) \\;\\Rightarrow\\; x_1 = x_2.\\)"
        - "Conversely, if \\(f\\) is one-to-one, each \\(y \\in B\\) has a unique preimage \\(x \\in A\\)."
        - "The map \\(y \\mapsto x\\) is the inverse. \\(\\square\\)"

  -
    scene_id: "basic_inverse_examples"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "Two Quick Inverses"
    voiceover: >
      Before doing any real algebra, two inverses you should be able to see at a glance.
      The identity function f of x equals x sends every number to itself, so its inverse is also
      the identity: f inverse of x equals x. Now g of x equals x cubed. To invert it, ask: what
      sends the output back? The cube root. So g inverse of x equals the cube root of x. No
      procedure needed when the algebra is this direct.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 6.0
    data:
      steps:
        - "Identity: \\(f(x) = x\\) leaves every input alone."
        - "So \\(f^{-1}(x) = x\\): the inverse of the identity is itself."
        - "Cubing: \\(g(x) = x^3\\). What undoes a cube? The cube root."
        - "So \\(g^{-1}(x) = \\sqrt[3]{x}\\)."
      takeaway: "Reading off an inverse by inspection works whenever the forward rule has an obvious undoer."
      math_lines:
        - "\\[f(x) = x \\;\\Longrightarrow\\; f^{-1}(x) = x.\\]"
        -
          text: "\\[g(x) = x^3 \\;\\Longrightarrow\\; g^{-1}(x) = \\sqrt[3]{x}.\\]"
          animation: "highlight"

  -
    scene_id: "composition_identities"
    template: "definition_math"
    content_type: "proposition"
    scene_exit: "hold"
    title: "The Cancellation Equations"
    # This scene also absorbs the content of book fig:inverse-composition (the mapping diagram).
    # The voiceover narrates f and f^{-1} as round-trips in both directions, which is what the
    # mapping diagram would show.
    voiceover: >
      The inverse literally undoes the original. That gives two composition identities worth
      memorizing. First: f inverse of f of x equals x, for every x in the domain of f. Apply f,
      then undo it with f inverse, and you land back where you started. Second: f of f inverse
      of x equals x, for every x in the range of f. Apply f inverse, then f, and again you return
      to where you started. These two identities are also your verification tool: if you think
      you have found f inverse, check that both round-trips give back x.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.7
      minimum_duration_seconds: 6.5
    data:
      statement: "An inverse undoes the original function in both directions."
      math_lines:
        -
          text: "\\[f^{-1}\\!\\left(f(x)\\right) = x \\qquad \\text{for every } x \\in A.\\]"
          animation: "write"
        -
          text: "\\[f\\!\\left(f^{-1}(x)\\right) = x \\qquad \\text{for every } x \\in B.\\]"
          animation: "highlight"

  # ============================================================
  # Transition from 1.1.2 to 1.1.3 (finding the inverse)
  # ============================================================
  -
    scene_id: "transition_to_procedure"
    template: "section_transition"
    scene_exit: "hold"
    title: "Finding the Inverse"
    voiceover: >
      We know when an inverse exists. Now we need a procedure for actually computing one.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.4
      minimum_duration_seconds: 3.0
    data:
      subtitle: "From existence to computation"
      upcoming:
        - "A three-step procedure"
        - "A worked cubic example"
        - "Restricting the domain to recover an inverse"

  # ============================================================
  # Subsection 1.1.3: finding the inverse
  # ============================================================
  -
    scene_id: "finding_inverse_procedure"
    template: "procedure_steps"
    content_type: "procedure"
    scene_exit: "hold"
    title: "How to Find an Inverse"
    voiceover: >
      When you already know f is one-to-one, finding its inverse is mechanical. Step one: write
      y equals f of x. Step two: solve that equation for x in terms of y. This is usually the
      hardest step, because the difficulty depends entirely on the algebra of f. Step three:
      interchange x and y. That last swap is not cosmetic -- it rewrites the inverse as a function
      of x, which is the standard convention.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 5.5
    data:
      steps:
        - "Write \\(y = f(x)\\)."
        - "Solve for \\(x\\) in terms of \\(y\\)."
        - "Interchange \\(x\\) and \\(y\\) to get \\(f^{-1}(x)\\)."
      worked_equations:
        - "\\[y = f(x) \\;\\longrightarrow\\; x = \\cdots \\;\\longrightarrow\\; f^{-1}(x) = \\cdots\\]"

  -
    scene_id: "example_cubic"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "Worked Example: $f(x) = x^3 + 2$"
    voiceover: >
      Apply the procedure to f of x equals x cubed plus two. Step one: write y equals x cubed
      plus two. Step two: subtract two from both sides, then take the cube root. That gives x
      equals the cube root of y minus two. Step three: interchange x and y. So f inverse of x
      equals the cube root of x minus two. Always close with a check. Plug f inverse into f:
      cube the cube root, which brings back x minus two, then add two, which brings back x.
      The cancellation equation holds, so the inverse is correct.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 7.5
    data:
      steps:
        - "Write \\(y = x^3 + 2\\)."
        - "Solve: \\(x^3 = y - 2\\), then \\(x = \\sqrt[3]{\\,y - 2\\,}\\)."
        - "Swap: \\(f^{-1}(x) = \\sqrt[3]{\\,x - 2\\,}\\)."
        - "Verify: \\(f(f^{-1}(x)) = (\\sqrt[3]{x - 2})^3 + 2 = x. \\;\\checkmark\\)"
      takeaway: "Always close with a cancellation check -- it catches algebra mistakes instantly."
      math_layout: "equals_aligned"
      math_lines:
        - "\\[y = x^3 + 2\\]"
        -
          text: "\\[x = \\sqrt[3]{\\,y - 2\\,}\\]"
          animation: "transform_from_previous"
        -
          text: "\\[f^{-1}(x) = \\sqrt[3]{\\,x - 2\\,}\\]"
          animation: "highlight"

  -
    scene_id: "cubic_graph_reflection"
    template: "graph_focus"
    content_type: "example"
    # Added per MANIM_STORYBOARD.md: book states "graphs are reflections across y=x" in prose
    # alone (chapters/ch01_foundations.tex line 243). Prose geometric claim -> graph_focus scene.
    scene_exit: "hold"
    title: "Graphs of $f$ and $f^{-1}$"
    voiceover: >
      Here is the geometric punchline. The graph of f of x equals x cubed plus two is an S-shaped
      curve shifted up by two. The graph of its inverse, the cube root of x minus two, is the
      mirror image reflected across the dashed line y equals x. Every point a comma b that sits
      on f corresponds to the point b comma a sitting on f inverse. This reflection property
      works for every invertible function paired with its inverse -- it is not special to cubics.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 1.0
      minimum_duration_seconds: 6.0
    data:
      axes:
        x_range: [-3, 5, 1]
        y_range: [-3, 5, 1]
        x_length: 8.0
        y_length: 6.0
        include_numbers: true
        tips: true
      plots:
        -
          kind: "function"
          expression: "x**3 + 2"
          x_range: [-1.7, 1.45]
          color: "#4cc9f0"
          label: "$f(x) = x^3 + 2$"
          label_side: "up"
          label_x: -0.8
        -
          kind: "function"
          expression: "cbrt(x - 2)"
          x_range: [-1.1, 5.0]
          color: "#f9a825"
          label: "$f^{-1}(x)$"
          label_side: "down"
          label_x: 4.0
        -
          kind: "line"
          start: [-2.5, -2.5]
          end: [4.5, 4.5]
          color: "#c8c8d8"
          dashed: true
          label: "$y = x$"
      annotations:
        -
          text: "The point \\((a, b)\\) on \\(f\\) corresponds to \\((b, a)\\) on \\(f^{-1}\\)."

  -
    scene_id: "domain_restriction_idea"
    template: "example_walkthrough"
    content_type: "example"
    scene_exit: "hold"
    title: "Restricting the Domain of $x^2$"
    voiceover: >
      Earlier we saw that x squared on minus one to one is not one-to-one. But what if we trim
      the domain? On the interval x greater than or equal to zero, the parabola is strictly
      increasing -- larger inputs always give strictly larger outputs. So on that smaller domain,
      x squared is one-to-one. Now we can invert it. Write y equals x squared with x at least
      zero. Solve: x equals the square root of y, where we pick the nonnegative root because the
      original domain required x at least zero. Swap x and y: f inverse of x equals the square
      root of x, with x at least zero.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 0.6
      minimum_duration_seconds: 7.0
    data:
      steps:
        - "On \\([-1, 1]\\), \\(x^2\\) is not one-to-one."
        - "On \\([0, \\infty)\\), \\(x^2\\) is strictly increasing, hence one-to-one."
        - "Write \\(y = x^2\\), \\(x \\ge 0\\). Solve: \\(x = \\sqrt{y}\\) (nonnegative root)."
        - "Swap: \\(f^{-1}(x) = \\sqrt{x}\\), \\(x \\ge 0\\)."
      takeaway: "A function that is not globally one-to-one may still become invertible after restricting its domain."
      math_layout: "equals_aligned"
      math_lines:
        - "\\[y = x^2, \\quad x \\ge 0\\]"
        -
          text: "\\[x = \\sqrt{y}\\]"
          animation: "transform_from_previous"
        -
          text: "\\[f^{-1}(x) = \\sqrt{x}, \\quad x \\ge 0\\]"
          animation: "highlight"

  -
    scene_id: "restricted_parabola_graph"
    template: "graph_focus"
    content_type: "example"
    # Added visualization: book leaves the restricted-domain reflection as prose. The whole point
    # of this example is that domain restriction rescues invertibility -- that is a visual claim.
    scene_exit: "hold"
    title: "$x^2$ and $\\sqrt{x}$ as Reflections"
    voiceover: >
      On the restricted domain, the graph of x squared is the right half of a parabola. Its
      inverse, the square root function, is the reflection across y equals x. Notice how
      symmetric the two curves sit about the dashed diagonal. This is exactly the same reflection
      we saw with the cubic. The point of this example is the domain trick: a function that
      failed the one-to-one test globally becomes invertible once we shrink its domain to a
      piece where it is one-to-one.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 1.0
      minimum_duration_seconds: 6.0
    data:
      axes:
        x_range: [-0.5, 4.5, 1]
        y_range: [-0.5, 4.5, 1]
        x_length: 7.0
        y_length: 6.0
        include_numbers: true
        tips: true
      plots:
        -
          kind: "function"
          expression: "x**2"
          x_range: [0, 2.05]
          color: "#4cc9f0"
          label: "$f(x) = x^2$"
          label_side: "left"
          label_x: 1.6
        -
          kind: "function"
          expression: "sqrt(x)"
          x_range: [0, 4.2]
          color: "#f9a825"
          label: "$f^{-1}(x) = \\sqrt{x}$"
          label_side: "up"
          label_x: 2.0
        -
          kind: "line"
          start: [-0.3, -0.3]
          end: [4.2, 4.2]
          color: "#c8c8d8"
          dashed: true
          label: "$y = x$"
      annotations:
        -
          text: "Domain restriction makes \\(x^2\\) invertible."

  # ============================================================
  # Closing recap
  # ============================================================
  -
    scene_id: "recap"
    template: "recap_cards"
    content_type: "recap"
    scene_exit: "hold"
    title: "Key Takeaways"
    voiceover: >
      Let us pull it all together. A function is one-to-one when no two inputs share an output,
      and the horizontal line test is the fast visual check. A function has an inverse if and
      only if it is one-to-one. To find the inverse: write y equals f of x, solve for x, then
      swap x and y. Verify with the cancellation equations. Geometrically, the graph of f inverse
      is the reflection of f across the line y equals x. And if a function is not one-to-one
      globally, restricting its domain can still give you an inverse.
    timing:
      lead_in_seconds: 0.2
      hold_after_seconds: 1.0
      minimum_duration_seconds: 7.0
    data:
      points:
        - "One-to-one: different inputs \\(\\Rightarrow\\) different outputs."
        - "Horizontal line test: at most one intersection per horizontal line."
        - "Inverse exists \\(\\Longleftrightarrow\\) the function is one-to-one."
        - "Procedure: write \\(y = f(x)\\), solve for \\(x\\), swap."
        - "Verify with \\(f^{-1}(f(x)) = x\\) and \\(f(f^{-1}(x)) = x\\)."
        - "Graph of \\(f^{-1}\\) = reflection of \\(f\\) across \\(y = x\\)."
        - "Domain restriction can rescue invertibility."
      identities:
        - "\\[f^{-1}(f(x)) = x\\]"
        - "\\[f(f^{-1}(x)) = x\\]"

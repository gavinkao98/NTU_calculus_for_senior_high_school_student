name: LaTeX Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            biber \
            latexmk \
            python3 \
            texlive-bibtex-extra \
            texlive-latex-extra \
            texlive-pictures

      - name: Run style lint
        run: python tools/book_style_lint.py

      - name: Run preamble smoke test
        run: python tools/book_preamble_smoketest.py

      - name: Run docs lint
        run: python tools/book_docs_lint.py

      - name: Build main book
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error main.tex
